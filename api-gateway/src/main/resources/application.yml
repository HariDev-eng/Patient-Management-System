server:
  port: 4004

spring:
  application:
    name: api-gateway

management:
  endpoints:
    web:
      exposure:
        include: gateway,health,info

  cloud:
    gateway:
      routes:
        - id: patient-service-route
          uri: http://patient-service:4000
          predicates:
            - Path=/api/patients/**
          filters:
            - StripPrefix=1

logging:
  level:
    org.springframework.cloud.gateway: DEBUG