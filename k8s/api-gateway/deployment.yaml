# HOW WE READ THIS FROM YOUR CODE:
# Dockerfile: EXPOSE 4004  → containerPort: 4004
# api-gateway is the ONLY service with NodePort (accessible from outside cluster)
# All other services are ClusterIP (internal only)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: patient-management
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: your-dockerhub-username/api-gateway:latest
          ports:
            - containerPort: 4004
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "400Mi"
              cpu: "400m"
