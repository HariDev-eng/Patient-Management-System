apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: patient-management
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: haripradap09/auth-service:1
          ports:
            - containerPort: 4005
          resources:
            requests:
              memory: "256Mi"
              cpu: "150m"
            limits:
              memory: "400Mi"
              cpu: "300m"
