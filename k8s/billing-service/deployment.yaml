apiVersion: apps/v1
kind: Deployment
metadata:
  name: billing-service
  namespace: patient-management
spec:
  replicas: 1
  selector:
    matchLabels:
      app: billing-service
  template:
    metadata:
      labels:
        app: billing-service
    spec:
      containers:
        - name: billing-service
          image: haripradap09/billing-service:1
          ports:
            - name: http
              containerPort: 4001
            - name: grpc
              containerPort: 9001
          resources:
            requests:
              memory: "256Mi"
              cpu: "150m"
            limits:
              memory: "400Mi"
              cpu: "300m"
