apiVersion: apps/v1
kind: Deployment
metadata:
  name: doctor-svc
  namespace: patient-management
spec:
  replicas: 1
  selector:
    matchLabels:
      app: doctor-svc
  template:
    metadata:
      labels:
        app: doctor-svc
    spec:
      containers:
        - name: doctor-svc
          image: haripradap09/doctor-svc:1
          ports:
            - containerPort: 4006
          env:
            - name: SPRING_DATASOURCE_URL
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: DOCTOR_DB_URL
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: DB_USERNAME
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: DB_PASSWORD
            - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: KAFKA_BOOTSTRAP_SERVERS
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "400Mi"
              cpu: "400m"
