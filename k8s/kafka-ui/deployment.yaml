# HOW WE READ THIS:
# docker-compose.yaml → image: provectuslabs/kafka-ui:latest
# docker-compose.yaml → KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka-ui
  namespace: patient-management
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kafka-ui
  template:
    metadata:
      labels:
        app: kafka-ui
    spec:
      containers:
        - name: kafka-ui
          image: provectuslabs/kafka-ui:latest
          ports:
            - containerPort: 8080
          env:
            - name: KAFKA_CLUSTERS_0_NAME
              value: "local"
            - name: KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS
              value: "kafka:9092"
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"
