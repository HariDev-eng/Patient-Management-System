# kafka-ui/deployment.yaml
# FIX: ImagePullBackOff means K8s can't pull the image
# The old pod (Running) used provectuslabs/kafka-ui:latest
# The new pod is trying to pull a different/broken image tag
# This uses the exact same image as docker-compose

apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka-ui
  namespace: patient-management
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kafka-ui
  template:
    metadata:
      labels:
        app: kafka-ui
    spec:
      containers:
        - name: kafka-ui
          image: provectuslabs/kafka-ui:latest
          imagePullPolicy: IfNotPresent    # don't re-pull if already downloaded
          ports:
            - containerPort: 8080
          env:
            - name: KAFKA_CLUSTERS_0_NAME
              value: "local"
            - name: KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS
              value: "kafka:9092"
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"
