# secret.yaml
# WHY Secret instead of ConfigMap?
# ConfigMap = plain text, anyone with kubectl can read it easily
# Secret    = base64 encoded, meant for sensitive data like passwords and JWT keys
# In production: use Vault or AWS Secrets Manager. For learning, this is fine.
#
# HOW to read a Secret:
#   kubectl get secret app-secrets -n patient-management -o yaml
# HOW to decode a value:
#   echo "cGFzc3dvcmQ=" | base64 --decode  → password

apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
  namespace: patient-management
type: Opaque
data:
  # echo -n "patient-management-jwt-secret-haripradap09-2024" | base64
  JWT_SECRET: cGF0aWVudC1tYW5hZ2VtZW50LWp3dC1zZWNyZXQtaGFyaXByYWRhcDA5LTIwMjQ=
  # echo -n "password" | base64
  DB_PASSWORD: cGFzc3dvcmQ=
  # echo -n "admin_user" | base64
  DB_USERNAME: YWRtaW5fdXNlcg==
