services:

  db:
    image: postgres:17
    container_name: patient-service-db
    environment:
      POSTGRES_USER: admin_user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: db
    ports:
      - "5000:5432"
    networks:
      - internal

  patient-service:
    build:
      context: ..
      dockerfile: patient-service/Dockerfile
    container_name: patient-service
    depends_on:
      - db
    ports:
      - "4000:4000"
      - "9001:9001"
    volumes:
      - patient_db_data:/var/lib/postgresql/data

    environment:
      SPRING_DATASOURCE_URL: ${DB_URL}
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_SQL_INIT_MODE: never
      SPRING_KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_SERVER}

      BILLING_SERVICE_ADDRESS: ${BILLING_SERVICE_ADDRESS}
      BILLING_SERVICE_GRPC_PORT: ${BILLING_SERVICE_GRPC_PORT}
    networks:
      - internal

networks:
  internal:
    external: true
volumes:
  patient_db_data: