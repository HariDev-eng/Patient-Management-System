syntax = "proto3";

package patient.events;

option java_multiple_files = true;

message PatientEvent {
  string patientId = 1;

  string firstName = 2;
  string lastName = 3;

  string email = 4;
  string phone = 5;

  string gender = 6;
  string bloodGroup = 7;

  string status = 8;

  string eventType = 9;
}