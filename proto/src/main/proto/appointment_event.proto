syntax = "proto3";

package appointment.events;

option java_multiple_files = true;

message AppointmentCreatedEvent {

  string appointmentId = 1;

  string patientId = 2;

  string doctorId = 3;

  string appointmentDateTime = 4;

  string reason = 5;

  string status = 6;

  string occurredAt = 7;
}