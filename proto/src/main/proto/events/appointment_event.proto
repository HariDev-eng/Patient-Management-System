syntax = "proto3";

package events;

option java_multiple_files = true;

message AppointmentEvent {

  string appointmentId = 1;

  string patientId = 2;

  string doctorId = 3;

  string appointmentDateTime = 4;

  string reason = 5;

  string status = 6;

  string eventType = 7;

  string occurredAt = 8;
}