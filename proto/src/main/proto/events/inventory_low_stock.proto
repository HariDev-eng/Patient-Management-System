syntax = "proto3";

package events;

option java_multiple_files = true;

option go_package = "github.com/haridev-eng/patient-management/proto/gen/events";

message InventoryLowStockEvent {

  string inventoryId = 1;

  string itemName = 2;

  int32 quantity = 3;

  int32 minimumStock = 4;

  string eventType = 5;

  string occurredAt = 6;
}