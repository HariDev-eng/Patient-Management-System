syntax = "proto3";

package events;

option java_multiple_files = true;

option go_package = "github.com/haridev-eng/patient-management/proto/gen/events";

message PatientEvent {

  string patientId = 1;

  string gender = 2;

  string bloodGroup = 3;

  string eventType = 4;

  string occurredAt = 5;
}