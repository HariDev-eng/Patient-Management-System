syntax = "proto3";

package events;

option java_multiple_files = true;
option go_package = "github.com/haridev-eng/patient-management/proto/gen/events";

message PatientEvent {

  string patientId = 1;

  string firstName = 2;

  string lastName = 3;

  string email = 4;

  string phone = 5;

  string gender = 6;

  string bloodGroup = 7;

  string eventType = 8;

  string occurredAt = 9;
}