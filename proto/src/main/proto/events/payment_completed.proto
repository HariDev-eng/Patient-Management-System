syntax = "proto3";

package events;

option java_multiple_files = true;

option go_package = "github.com/haridev-eng/patient-management/proto/gen/events";

message PaymentCompletedEvent {

  string paymentId = 1;

  string billId = 2;

  string patientId = 3;

  double amount = 4;

  string paymentMethod = 5;

  string paidAt = 6;
}