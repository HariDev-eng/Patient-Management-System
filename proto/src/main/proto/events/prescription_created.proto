syntax = "proto3";

package events;

option java_multiple_files = true;

option go_package = "github.com/haridev-eng/patient-management/proto/gen/events";

message PrescriptionEvent {

  string prescriptionId = 1;

  string patientId = 2;

  string doctorId = 3;

  string diagnosisId = 4;

  string appointmentId = 5;

  int32 medicineCount = 6;

  string eventType = 7;

  string occurredAt = 8;
}