syntax = "proto3";

package patient;

option java_multiple_files = true;

service PatientService {

  rpc PatientExists (
      PatientExistsRequest
      ) returns (
      PatientExistsResponse
      );

}

message PatientExistsRequest {
  string patientId = 1;
}

message PatientExistsResponse {
  bool exists = 1;
}