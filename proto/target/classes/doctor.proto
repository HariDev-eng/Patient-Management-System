syntax = "proto3";

package doctor;

option java_multiple_files = true;

service DoctorService {

  rpc DoctorExists(
      DoctorExistsRequest
      ) returns (
      DoctorExistsResponse
      );

  rpc CheckAvailability(
      DoctorAvailabilityRequest
      ) returns (
      DoctorAvailabilityResponse
      );

}

message DoctorExistsRequest {
  string doctorId = 1;
}

message DoctorExistsResponse {
  bool exists = 1;
}

message DoctorAvailabilityRequest {
  string doctorId = 1;
}

message DoctorAvailabilityResponse {
  bool available = 1;
}