syntax = "proto3";

package events;

option java_multiple_files = true;

message BillingEvent {

  string billId = 1;

  string patientId = 2;

  string appointmentId = 3;

  double amount = 4;

  string paymentMethod = 5;

  string paymentStatus = 6;

  string eventType = 7;

  string occurredAt = 8;
}