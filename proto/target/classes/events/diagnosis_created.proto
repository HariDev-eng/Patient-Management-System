syntax = "proto3";

package events;

option java_multiple_files = true;

message DiagnosisEvent {

  string diagnosisId = 1;

  string patientId = 2;

  string doctorId = 3;

  string appointmentId = 4;

  string diagnosis = 5;

  bool followUpRequired = 6;

  int32 followUpDays = 7;

  string followUpDate = 8;

  string eventType = 9;

  string occurredAt = 10;
}