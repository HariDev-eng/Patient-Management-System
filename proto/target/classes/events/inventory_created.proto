syntax = "proto3";

package events;

option java_multiple_files = true;

message InventoryEvent {

  string inventoryId = 1;

  string itemName = 2;

  string itemCode = 3;

  int32 quantity = 4;

  int32 minimumStock = 5;

  double unitPrice = 6;

  string status = 7;

  string eventType = 8;

  string occurredAt = 9;
}