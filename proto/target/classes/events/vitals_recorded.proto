syntax = "proto3";

package events;

option java_multiple_files = true;

message VitalsRecordedEvent {

  string vitalId = 1;

  string patientId = 2;

  string nurseId = 3;

  double temperature = 4;

  int32 heartRate = 5;

  int32 systolicBP = 6;

  int32 diastolicBP = 7;

  double weight = 8;

  double height = 9;

  int32 oxygenSaturation = 10;

  string recordedAt = 11;
}